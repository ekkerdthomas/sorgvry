services:
  sorgvry-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sorgvry-backend
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:8600:8080"
      - "172.17.0.1:8600:8080"
    volumes:
      - /opt/sorgvry/data:/app/data
    env_file:
      - /opt/sorgvry/.env
    environment:
      - DB_PATH=/app/data/sorgvry.db
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
